<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synapse — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #05050A;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Ambient orbs */
    .orb-field {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(160px);
      opacity: 0.15;
    }

    .orb-cyan {
      width: 60vw;
      height: 60vw;
      top: -20%;
      left: -5%;
      background: #00E5FF;
      animation: drift1 30s ease-in-out infinite alternate;
    }

    .orb-violet {
      width: 55vw;
      height: 65vw;
      bottom: -25%;
      right: -10%;
      background: #7000FF;
      animation: drift2 36s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      0% {
        transform: translate(0, 0) scale(1)
      }

      100% {
        transform: translate(30px, 25px) scale(1.04)
      }
    }

    @keyframes drift2 {
      0% {
        transform: translate(0, 0) scale(1.02)
      }

      100% {
        transform: translate(-25px, -20px) scale(0.98)
      }
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .grid-mesh {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 52px 52px;
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(24px) saturate(120%);
      -webkit-backdrop-filter: blur(24px) saturate(120%);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 18px;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.08), inset 0 0 0 1px rgba(255, 255, 255, 0.03), 0 40px 80px -16px rgba(0, 0, 0, 0.7);
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 14%;
      right: 14%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
    }

    .card-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, #00E5FF 0%, #0090a0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      color: #000;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 4px 16px -4px rgba(0, 0, 0, 0.5);
    }

    .logo-name {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
      color: #8B8B9E;
      cursor: pointer;
      transition: all 0.2s ease-out;
    }

    .tab:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #ccc;
    }

    .tab.active {
      background: rgba(0, 229, 255, 0.08);
      border-color: rgba(0, 229, 255, 0.18);
      color: #00E5FF;
    }

    /* Demo chips */
    .demo-chips {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .demo-chip {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #8B8B9E;
      cursor: pointer;
      transition: all 0.2s ease-out;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .demo-chip:hover {
      background: rgba(0, 229, 255, 0.06);
      border-color: rgba(0, 229, 255, 0.16);
      color: #00E5FF;
    }

    .demo-chip svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Form */
    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #3E3E52;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    input,
    select {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 9px;
      padding: 11px 14px;
      font-size: 13px;
      color: #fff;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.06), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    input:focus,
    select:focus {
      border-color: rgba(0, 229, 255, 0.35);
      background: rgba(0, 229, 255, 0.03);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.06), inset 0 0 0 1px rgba(255, 255, 255, 0.02), 0 0 0 3px rgba(0, 229, 255, 0.06);
    }

    input::placeholder {
      color: #3E3E52;
    }

    select option {
      background: #0a0a14;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(180deg, #14E8FF 0%, #00C4DD 100%);
      color: #000;
      border: none;
      padding: 13px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 24px 48px -12px rgba(0, 0, 0, 0.5);
      margin-top: 8px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .btn-primary:active {
      transform: scale(0.97);
      filter: brightness(0.95);
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }
  </style>
</head>

<body>
  <div class="orb-field">
    <div class="orb orb-cyan"></div>
    <div class="orb orb-violet"></div>
  </div>
  <div class="grain"></div>
  <div class="grid-mesh"></div>

  <div class="card">
    <div class="card-logo">
      <div class="logo-mark">S</div>
      <div class="logo-name">Synapse</div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('signin')">Sign In</div>
      <div class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- Quick-fill demo accounts -->
    <div class="demo-chips">
      <div class="demo-chip" onclick="fillDemo('teacher')">
        <svg viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Demo Teacher
      </div>
      <div class="demo-chip" onclick="fillDemo('student')">
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        Demo Student
      </div>
    </div>

    <!-- Sign In Form -->
    <div class="form-section active" id="form-signin">
      <div class="field">
        <label>Email</label>
        <input type="email" id="si-email" placeholder="you@university.edu" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="si-pass" placeholder="Enter password" />
      </div>
      <button class="btn-primary" onclick="handleSignin()">Sign In</button>
    </div>

    <!-- Sign Up Form -->
    <div class="form-section" id="form-signup">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="su-name" placeholder="Your name" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="su-email" placeholder="you@university.edu" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="su-pass" placeholder="Min 6 characters" />
      </div>
      <div class="field">
        <label>Role</label>
        <select id="su-role">
          <option value="teacher">Instructor</option>
          <option value="student">Student</option>
        </select>
      </div>
      <button class="btn-primary" onclick="handleSignup()">Create Account</button>
    </div>
  </div>

  <script>
    const MOCK_USERS = [
      { email: 'teacher@demo.com', password: 'demo1234', role: 'teacher', name: 'Demo Teacher' },
      { email: 'student@demo.com', password: 'demo1234', role: 'student', name: 'Demo Student' },
      { email: 'vraj@synapse.dev', password: 'demo1234', role: 'teacher', name: 'Vraj Vashi' },
    ];

    function switchTab(id) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === (id === 'signin' ? 0 : 1)));
      document.getElementById('form-signin').classList.toggle('active', id === 'signin');
      document.getElementById('form-signup').classList.toggle('active', id === 'signup');
    }

    function fillDemo(role) {
      switchTab('signin');
      const acct = role === 'teacher' ? MOCK_USERS[0] : MOCK_USERS[1];
      document.getElementById('si-email').value = acct.email;
      document.getElementById('si-pass').value = acct.password;
    }

    function redirect(userObj) {
      localStorage.setItem('synapse_user', JSON.stringify(userObj));
      window.location.href = userObj.role === 'teacher' ? 'classrooms.html' : 'student.html';
    }

    function handleSignin() {
      const email = document.getElementById('si-email').value.trim().toLowerCase();
      const pass = document.getElementById('si-pass').value;
      if (!email || !pass) return;
      const found = MOCK_USERS.find(u => u.email === email && u.password === pass);
      if (found) { redirect(found); return; }
      const stored = JSON.parse(localStorage.getItem('synapse_users') || '[]');
      const user = stored.find(u => u.email === email && u.password === pass);
      if (user) { redirect(user); } else { alert('Invalid credentials'); }
    }

    function handleSignup() {
      const name = document.getElementById('su-name').value.trim();
      const email = document.getElementById('su-email').value.trim().toLowerCase();
      const pass = document.getElementById('su-pass').value;
      const role = document.getElementById('su-role').value;
      if (!name || !email || pass.length < 6) { alert('Please fill in all fields'); return; }
      const users = JSON.parse(localStorage.getItem('synapse_users') || '[]');
      const newUser = { email, password: pass, role, name };
      users.push(newUser);
      localStorage.setItem('synapse_users', JSON.stringify(users));
      redirect(newUser);
    }
  </script>
</body>

</html>
