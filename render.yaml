services:
  # ── Frontend (React/Vite) on Render ──────────────────────────────────────────
  - type: web
    name: synapse-dashboard
    runtime: static
    buildCommand: cd dashboard-v2 && npm install && npm run build
    staticPublishPath: dashboard-v2/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # you will fill this in Render UI after the backend is deployed
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
